name: Node.js CI (Testes)

on:
  push:
    branches: ['main', 'master']
  pull_request:
    branches: ['main', 'master']

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # Se algum dos seus testes precisar de um banco real temporário para rodar no GitHub, ele sobe aqui:
    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017

    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Usar o Node.js 22.x
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Instalar dependências
        run: npm install

      - name: Executar testes unitários
        run: npm test
